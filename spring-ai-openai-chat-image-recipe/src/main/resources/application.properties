# APPLICATION
spring.application.name=spring-ai-openai-chat-image-recipe
server.port=8118

# OPENAI CONFIG
spring.ai.openai.api-key=${OPEN_API_KEY}

# Optional (if needed)
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.4


# LOGGING CONFIG
logging.level.root=INFO
logging.level.com.ai.SpringAiDemo=DEBUG

# Log file (optional)
logging.file.name=logs/app.log


# ACTUATOR CONFIG
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Custom info (visible in /actuator/info)
info.app.name=Spring AI Demo
info.app.description=AI-powered Chat, Image, Recipe APIs
info.app.version=1.0.0


# SWAGGER (OPENAPI) CONFIG
#springdoc.api-docs.path=/v3/api-docs
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.swagger-ui.operationsSorter=method
#springdoc.swagger-ui.tagsSorter=alpha


# CORS (optional if not using WebConfig)
# spring.web.cors.allowed-origins=http://localhost:3000
# spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# SERVER PERFORMANCE (OPTIONAL)
server.tomcat.max-threads=200
server.tomcat.accept-count=100

# ERROR HANDLING
server.error.include-message=always
server.error.include-binding-errors=always